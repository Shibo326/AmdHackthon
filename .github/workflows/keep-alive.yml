name: Keep Railway Alive

on:
  schedule:
    # Ping every 5 minutes to prevent Railway cold starts
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -sf https://amdhackthon-production.up.railway.app/health || echo "Backend ping failed (non-fatal)"
